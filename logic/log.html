<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FRAVI · Photography</title>

    <!-- Tailwind + DaisyUI -->
    <script src="https://cdn.tailwindcss.com">
    </script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.4.19/dist/full.css" rel="stylesheet" />

    <!-- Google Fonts: Playfair Display (Headings) + Inter (Body) -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

    <style>
        /* ----- FONT SETUP ----- */
        .heading-font {
            font-family: 'Playfair Display', serif;
        }

        .body-font {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        * {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            background: #1a1418;
        }

        /* ----- FULLSCREEN BACKGROUND SLIDESHOW ----- */
        .bg-slide {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            opacity: 0;
            transition: opacity 1.8s ease-in-out;
            background-size: cover;
            background-position: center;
        }
        .bg-slide.active {
            opacity: 1;
            z-index: 1;
        }

        /* Dark vintage overlay */
        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            background: rgba(26, 20, 24, 0.55);
            backdrop-filter: blur(1.5px);
        }

        /* ---------- WIDER VINTAGE LUXURY GLASS CARD ---------- */
        .form-card {
            position: relative;
            z-index: 3;
            background: rgba(17, 14, 11, 0.78);
            backdrop-filter: blur(20px) saturate(160%);
            -webkit-backdrop-filter: blur(20px) saturate(160%);
            border-radius: 32px;
            padding: 2.5rem 3rem;
            width: 100%;
            max-width: 580px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(59, 47, 47, 0.4);
            border: 1px solid rgba(59, 47, 47, 0.25);
            max-height: 92vh;
            overflow-y: auto;
            transition: all 0.2s;
        }
        .form-card::-webkit-scrollbar {
            width: 3px;
        }
        .form-card::-webkit-scrollbar-thumb {
            background: #3b2f2f;
            border-radius: 20px;
        }

        /* ----- HEADINGS - Playfair Display ----- */
        .form-card h2 {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            color: #f5e6c8;
            letter-spacing: -0.3px;
        }

        .brand-word {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: #f5e6c8;
            text-shadow: 0 2px 20px rgba(0, 0, 0, 0.5);
        }
        .brand-dot {
            color: #c8a97e;
            font-weight: 300;
        }

        /* ----- BODY TEXT - Inter ----- */
        .sub-muted {
            font-family: 'Inter', sans-serif;
            font-weight: 400;
            color: #a8866a;
            font-size: 0.85rem;
            letter-spacing: 0.2px;
        }

        .label-text {
            font-family: 'Inter', sans-serif;
            font-size: 0.7rem;
            font-weight: 600;
            color: #a8866a;
            letter-spacing: 0.8px;
            text-transform: uppercase;
            display: block;
            margin-bottom: 5px;
        }

        /* ----- INPUTS ----- */
        .input-field {
            font-family: 'Inter', sans-serif;
            background: rgba(17, 14, 11, 0.6);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            border: 1px solid #3b2f2f;
            border-radius: 14px;
            padding: 0.75rem 1rem;
            font-size: 0.9rem;
            font-weight: 500;
            color: #e8dcc5;
            width: 100%;
            outline: none;
            transition: all 0.25s ease;
            letter-spacing: 0.01em;
        }
        .input-field::placeholder {
            color: #6b5846;
            font-weight: 400;
        }
        .input-field:focus {
            border-color: #c8a97e;
            background: rgba(17, 14, 11, 0.8);
            box-shadow: 0 0 0 4px rgba(200, 169, 126, 0.08);
        }

        /* ----- BUTTONS ----- */
        .social-btn {
            font-family: 'Inter', sans-serif;
            background: rgba(17, 14, 11, 0.5);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            border: 1px solid #3b2f2f;
            border-radius: 40px;
            padding: 0.7rem 1rem;
            font-size: 0.8rem;
            font-weight: 600;
            color: #e8dcc5;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .social-btn:hover {
            background: rgba(200, 169, 126, 0.12);
            border-color: #c8a97e;
            transform: translateY(-2px);
            box-shadow: 0 12px 30px -8px rgba(0, 0, 0, 0.5);
            color: #f5e6c8;
        }
        .social-btn i {
            color: #c8a97e;
        }

        .btn-primary {
            font-family: 'Inter', sans-serif;
            font-weight: 700;
            background: rgba(200, 169, 126, 0.15);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid #c8a97e;
            border-radius: 40px;
            padding: 0.85rem;
            font-size: 0.9rem;
            color: #f5e6c8;
            width: 100%;
            cursor: pointer;
            transition: all 0.35s ease;
            box-shadow: 0 4px 24px rgba(200, 169, 126, 0.08);
            letter-spacing: 0.5px;
        }
        .btn-primary:hover {
            background: rgba(200, 169, 126, 0.28);
            border-color: #c8a97e;
            transform: translateY(-2px);
            box-shadow: 0 16px 40px -8px rgba(200, 169, 126, 0.18);
            color: white;
        }

        /* ----- TABS ----- */
        .tab-active {
            font-family: 'Inter', sans-serif;
            color: #f5e6c8;
            border-bottom: 2.5px solid #c8a97e;
            font-weight: 600;
            padding-bottom: 8px;
            background: transparent;
            font-size: 0.95rem;
            letter-spacing: 0.3px;
        }
        .tab-inactive {
            font-family: 'Inter', sans-serif;
            color: #6b5846;
            border-bottom: 2.5px solid transparent;
            padding-bottom: 8px;
            font-weight: 500;
            transition: all 0.3s ease;
            background: transparent;
            font-size: 0.95rem;
            letter-spacing: 0.3px;
        }
        .tab-inactive:hover {
            color: #a8866a;
            border-bottom-color: #3b2f2f;
        }

        /* ----- DIVIDER ----- */
        .divider-text {
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            color: #6b5846;
            font-size: 0.6rem;
            font-weight: 600;
            letter-spacing: 1.2px;
            text-transform: uppercase;
            margin: 18px 0 16px;
        }
        .divider-text::before,
        .divider-text::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #3b2f2f;
        }
        .divider-text:not(:empty)::before {
            margin-right: 16px;
        }
        .divider-text:not(:empty)::after {
            margin-left: 16px;
        }

        /* ----- LINKS ----- */
        .switch-link {
            font-family: 'Inter', sans-serif;
            color: #c8a97e;
            font-weight: 600;
            cursor: pointer;
            text-decoration: underline;
            text-underline-offset: 2px;
            transition: color 0.3s ease;
        }
        .switch-link:hover {
            color: #f5e6c8;
        }

        .forgot-link {
            font-family: 'Inter', sans-serif;
            color: #6b5846;
            font-weight: 500;
            font-size: 0.7rem;
            transition: color 0.3s ease;
            text-decoration: none;
            letter-spacing: 0.3px;
        }
        .forgot-link:hover {
            color: #c8a97e;
            text-decoration: underline;
        }

        /* wider layout - two column for signup */
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        /* ----- RESPONSIVE ----- */
        @media (max-width: 640px) {
            .form-card {
                padding: 1.8rem 1.4rem;
                border-radius: 28px;
                max-width: 96%;
                max-height: 95vh;
            }
            .brand-word {
                font-size: 1.6rem;
            }
            .form-card h2 {
                font-size: 1.2rem;
            }
            .form-row {
                grid-template-columns: 1fr;
                gap: 0;
            }
        }
    </style>
</head>
<body>

    <!-- === BACKGROUND SLIDES - B&W CAMERAS === -->
    <div class="bg-slide active" style="background-image:url('https://images.unsplash.com/photo-1516035069371-29a1b244cc32?w=1600&q=80&fit=crop&crop=left&sat=-100')"></div>
 <div class="bg-slide" style="background-image:url('https://images.unsplash.com/photo-1493246507139-91e8fad9978e?w=1600&q=80&fit=crop&crop=right&sat=-100')"></div>
   
    <!-- Overlay -->
    <div class="bg-overlay"></div>

    <!-- === CENTERED WIDER GLASS CARD === -->
    <div class="flex items-center justify-center h-screen w-screen relative z-10 p-4">

        <div class="form-card">

            <!-- Brand: FRAVI · Playfair Display -->
            <div class="flex items-center gap-3 mb-5">
                <span class="brand-word">FRAVI<span class="brand-dot">.</span></span>
            </div>

            <!-- Tabs -->
            <div class="flex gap-8 border-b border-[#3b2f2f]/50 pb-1 mb-4">
                <button id="tabSignin" class="tab-active transition">Sign In</button>
                <button id="tabSignup" class="tab-inactive transition">Sign Up</button>
            </div>

            <!-- ===== SIGN IN ===== -->
            <div id="signinForm">
                <div class="flex items-end justify-between mb-4">
                    <div>
                        <h2 class="text-2xl heading-font">Welcome Back</h2>
                        <p class="sub-muted">Access your photography dashboard</p>
                    </div>
                   
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <button class="social-btn">
                        <i class="fab fa-google"></i> Google
                    </button>
                    <button class="social-btn">
                        <i class="fab fa-apple"></i> Apple
                    </button>
                </div>

                <div class="divider-text">or continue with email</div>

                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="label-text">Email</label>
                        <input type="email" placeholder="your@email.com" class="input-field" />
                    </div>
                    <div>
                        <label class="label-text">Password</label>
                        <div class="flex items-center gap-2">
                            <input type="password" placeholder="••••••••" class="input-field" />
                            <a href="#" class="forgot-link whitespace-nowrap">Forgot?</a>
                        </div>
                    </div>
                </div>

                <button class="btn-primary mt-4">Sign In</button>

                <p class="text-center text-[#6b5846] text-sm mt-4 body-font">
                    No account? <span id="switchToSignup" class="switch-link">Create one</span>
                </p>
            </div>

            <!-- ===== SIGN UP ===== -->
            <div id="signupForm" class="hidden">
                <div class="flex items-end justify-between mb-4">
                    <div>
                        <h2 class="text-2xl heading-font">Create Account</h2>
                        <p class="sub-muted">Join the FRAVI community</p>
                    </div>
                     </div>

                <div class="grid grid-cols-2 gap-3">
                    <button class="social-btn">
                        <i class="fab fa-google"></i> Google
                    </button>
                    <button class="social-btn">
                        <i class="fab fa-apple"></i> Apple
                    </button>
                </div>

                <div class="divider-text">or use email</div>

                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="label-text">First name</label>
                        <input type="text" placeholder="Jane" class="input-field" />
                    </div>
                    <div>
                        <label class="label-text">Last name</label>
                        <input type="text" placeholder="Doe" class="input-field" />
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3 mt-3">
                    <div>
                        <label class="label-text">Email</label>
                        <input type="email" placeholder="your@email.com" class="input-field" />
                    </div>
                    <div>
                        <label class="label-text">Password</label>
                        <input type="password" placeholder="Create strong password" class="input-field" />
                    </div>
                </div>

                <button class="btn-primary mt-4">Create Account</button>

                <p class="text-center text-[#6b5846] text-sm mt-4 body-font">
                    Already a member? <span id="switchToSignin" class="switch-link">Sign In</span>
                </p>
            </div>

        </div>
    </div>

    <script>
        // ===== BACKGROUND SLIDESHOW =====
        const bgSlides = document.querySelectorAll('.bg-slide');
        let bgCurrent = 0;

        function nextBgSlide() {
            bgSlides.forEach(s => s.classList.remove('active'));
            bgCurrent = (bgCurrent + 1) % bgSlides.length;
            bgSlides[bgCurrent].classList.add('active');
        }
        setInterval(nextBgSlide, 5000);

        // ===== FORM SWITCHING =====
        const signinForm = document.getElementById('signinForm');
        const signupForm = document.getElementById('signupForm');
        const tabSignin = document.getElementById('tabSignin');
        const tabSignup = document.getElementById('tabSignup');
        const switchToSignup = document.getElementById('switchToSignup');
        const switchToSignin = document.getElementById('switchToSignin');

        function showSignin() {
            signinForm.classList.remove('hidden');
            signupForm.classList.add('hidden');
            tabSignin.className = 'tab-active transition';
            tabSignup.className = 'tab-inactive transition';
        }

        function showSignup() {
            signupForm.classList.remove('hidden');
            signinForm.classList.add('hidden');
            tabSignup.className = 'tab-active transition';
            tabSignin.className = 'tab-inactive transition';
        }

        tabSignin.addEventListener('click', showSignin);
        tabSignup.addEventListener('click', showSignup);
        switchToSignup.addEventListener('click', showSignup);
        switchToSignin.addEventListener('click', showSignin);

        // Silent action handlers
        document.querySelectorAll('.social-btn, .btn-primary').forEach(btn => {
            btn.addEventListener('click', function(e) {
                e.preventDefault();
                console.log('action:', this.innerText.trim());
            });
        });
        document.querySelector('.forgot-link')?.addEventListener('click', function(e) {
            e.preventDefault();
            console.log('forgot password');
        });
    </script>

</body>
</html>
