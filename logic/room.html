<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Exhibition · Steel & Copper</title>
  <!-- Tailwind + daisyUI (CDN) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.4.19/dist/full.css" rel="stylesheet" type="text/css" />
  <!-- Fonts: Georgia (headings) + Roboto (body & UI) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Georgia&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  <!-- Font Awesome 6 (free) for icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    /* custom overrides to match the palette exactly */
    :root {
      --steel-teal: #578088;
      --dolphin-gray: #74948c;
      --light-beige: #cfb580;
      --milk-chocolate: #864e3e;
      --copper-red: #ca7c4c;
    }
    body {
      font-family: 'Roboto', sans-serif;
      background: #f7f4ef;
      color: #2a3a3d;
    }
    h1, h2, h3, h4, .heading-font {
      font-family: 'Georgia', serif;
      letter-spacing: 0.02em;
    }
    /* small UI text (Roboto) */
    .ui-small {
      font-family: 'Roboto', sans-serif;
      font-size: 0.75rem;
      font-weight: 400;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--dolphin-gray);
    }
    /* custom daisyUI button override with copper red */
    .btn-copper {
      background: var(--copper-red);
      border: none;
      color: white;
    }
    .btn-copper:hover {
      background: var(--milk-chocolate);
    }
    .btn-outline-steel {
      background: transparent;
      border: 2px solid var(--steel-teal);
      color: var(--steel-teal);
    }
    .btn-outline-steel:hover {
      background: var(--steel-teal);
      color: white;
    }
    /* filter tabs style */
    .filter-tab {
      font-family: 'Roboto', sans-serif;
      font-size: 0.8rem;
      font-weight: 400;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--dolphin-gray);
      cursor: pointer;
      padding: 6px 0;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
      background: none;
      border-top: none;
      border-left: none;
      border-right: none;
    }
    .filter-tab:hover { color: var(--steel-teal); }
    .filter-tab.active {
      color: var(--copper-red);
      border-bottom-color: var(--copper-red);
      font-weight: 500;
    }
    /* card hover & transition */
    .exhibition-card {
      transition: all 0.3s cubic-bezier(0.2, 0, 0, 1);
      cursor: pointer;
      border: 1px solid rgba(207, 181, 128, 0.25);
    }
    .exhibition-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 20px 40px rgba(87, 128, 136, 0.12);
      border-color: var(--light-beige);
    }
    .card-img {
      height: 200px;
      background-size: cover;
      background-position: center;
      transition: transform 0.4s ease;
    }
    .exhibition-card:hover .card-img {
      transform: scale(1.02);
    }
    .category-badge {
      background: rgba(44, 58, 60, 0.75);
      backdrop-filter: blur(2px);
      color: white;
      font-family: 'Roboto', sans-serif;
      font-size: 0.65rem;
      font-weight: 400;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 4px 14px;
      border-radius: 30px;
    }
    /* lightbox modal override for daisyUI */
    .modal-box {
      max-width: 700px;
      padding: 0;
      overflow: hidden;
      border-radius: 16px;
      background: white;
      box-shadow: 0 30px 60px rgba(0,0,0,0.4);
    }
    .modal-box .lightbox-img {
      height: 320px;
      background-size: cover;
      background-position: center;
      background-color: #b7afa0;
    }
    .modal-box .lightbox-body {
      padding: 28px 32px 32px;
    }
    .modal-box .lightbox-body h3 {
      font-family: 'Georgia', serif;
      font-size: 2rem;
      color: var(--steel-teal);
      margin-bottom: 2px;
    }
    .modal-box .lightbox-body .artist {
      font-family: 'Roboto', sans-serif;
      font-weight: 300;
      font-size: 1.1rem;
      color: var(--dolphin-gray);
      margin-bottom: 10px;
    }
    .modal-box .lightbox-body .description {
      font-family: 'Roboto', sans-serif;
      font-weight: 300;
      font-size: 1rem;
      color: #3d4f52;
      margin: 16px 0 20px;
      line-height: 1.6;
    }
    .modal-box .lightbox-body .meta-grid {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      border-top: 1px solid #e6e2d8;
      padding-top: 16px;
      margin-top: 6px;
    }
    .modal-box .lightbox-body .meta-grid span {
      font-family: 'Roboto', sans-serif;
      font-size: 0.8rem;
      color: var(--dolphin-gray);
    }
    .modal-box .lightbox-body .meta-grid strong {
      color: var(--dark-text);
      font-weight: 500;
    }
  </style>
</head>
<body>

  <!-- MAIN CONTAINER (no header / footer) -->
  <main class="max-w-7xl mx-auto px-4 sm:px-6 py-6 sm:py-10">

    <!-- HERO (in page, no header) -->
    <div class="relative bg-gradient-to-br from-[#eef0ea] to-[#e2e4db] rounded-2xl px-6 py-12 sm:py-16 mb-10 border-b-4 border-[#ca7c4c] shadow-sm overflow-hidden">
      <div class="absolute right-0 bottom-0 w-64 h-64 bg-[#ca7c4c]/10 rounded-full blur-2xl"></div>
      <div class="relative z-10 text-center max-w-3xl mx-auto">
        <div class="text-sm font-light tracking-[0.25em] text-[#864e3e] uppercase mb-2 flex items-center justify-center gap-2">
          <i class="fas fa-camera text-[#ca7c4c]"></i> Curated Vision
        </div>
        <h2 class="text-4xl sm:text-5xl md:text-6xl font-normal text-[#578088] leading-tight">
          Where <span class="text-[#ca7c4c]">Copper</span> Meets <span class="text-[#578088]">Steel</span>
        </h2>
        <p class="text-base sm:text-lg text-[#3d4f52] max-w-xl mx-auto mt-3 font-light">
          An immersive exhibition of contemporary photography — texture, memory, and the interplay of natural &amp; industrial palettes.
        </p>
        <div class="flex flex-wrap justify-center gap-3 mt-6">
          <button class="btn btn-copper text-white px-6 py-2.5 rounded-full text-sm font-medium shadow-md hover:shadow-lg transition-all flex items-center gap-2">
            <i class="fas fa-compass"></i> Explore Gallery
          </button>
          <button class="btn bg-transparent border-2 border-white/70 text-white hover:bg-white hover:text-[#578088] px-6 py-2.5 rounded-full text-sm font-medium transition-all">
            View Artists
          </button>
        </div>
      </div>
    </div>

    <!-- FILTER / CATEGORY TABS (Roboto small UI) -->
    <div class="flex flex-wrap justify-center gap-2 sm:gap-4 border-b border-[#cfb580]/30 pb-4 mb-6" id="filterTabs">
      <button class="filter-tab active" data-filter="all">All</button>
      <button class="filter-tab" data-filter="Abstract">Abstract</button>
      <button class="filter-tab" data-filter="Urban">Urban</button>
      <button class="filter-tab" data-filter="Nature">Nature</button>
      <button class="filter-tab" data-filter="Portrait">Portrait</button>
      <button class="filter-tab" data-filter="Architecture">Architecture</button>
    </div>

    <!-- GALLERY GRID -->
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6" id="galleryGrid"></div>

  </main>

  <!-- LIGHTBOX (daisyUI modal) -->
  <input type="checkbox" id="lightboxModal" class="modal-toggle" />
  <div class="modal" role="dialog">
    <div class="modal-box relative p-0 max-w-3xl">
      <!-- close button (daisyui) -->
      <label for="lightboxModal" class="btn btn-sm btn-circle absolute right-4 top-4 z-20 bg-black/30 text-white border-0 hover:bg-[#ca7c4c] transition-all">
        <i class="fas fa-times"></i>
      </label>
      <div class="lightbox-img" id="lightboxImg" style="background-image: url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?w=600&h=400&fit=crop&crop=center');"></div>
      <div class="lightbox-body">
        <h3 id="lightboxTitle">Title</h3>
        <div class="artist" id="lightboxArtist">Artist</div>
        <div class="description" id="lightboxDesc">Description of the work.</div>
        <div class="meta-grid">
          <span><strong>Category:</strong> <span id="lightboxCategory">Abstract</span></span>
          <span><strong>Year:</strong> <span id="lightboxYear">2024</span></span>
          <span><strong>Medium:</strong> <span id="lightboxMedium">Digital</span></span>
        </div>
      </div>
    </div>
    <label class="modal-backdrop" for="lightboxModal">Close</label>
  </div>

  <script>
    // ----- EXHIBITION DATA (20 items, matching your palette & categories) -----
    const exhibitions = [
      { id: 1, title: "Melothesia", artist: "Ricardo Guixà", category: "Abstract", desc: "An exploration of color and form through abstract composition.", year: "2025", medium: "Digital C-print", img: "https://images.unsplash.com/photo-1541701494587-cb58502866ab?w=600&h=400&fit=crop&crop=center" },
      { id: 2, title: "Under Destruction", artist: "Linda Jarrett", category: "Urban", desc: "Documenting urban decay and transformation.", year: "2024", medium: "Archival Inkjet", img: "https://images.unsplash.com/photo-1519501025264-65ba15a82390?w=600&h=400&fit=crop&crop=center" },
      { id: 3, title: "Ad Lucem", artist: "Gabriele Fossi", category: "Nature", desc: "Toward the light - a journey through natural landscapes.", year: "2023", medium: "Giclée", img: "https://images.unsplash.com/photo-1500382017468-9049fed747ef?w=600&h=400&fit=crop&crop=center" },
      { id: 4, title: "Biosphere", artist: "Ilar Gunilla Persson", category: "Nature", desc: "The intersection of life and environment.", year: "2025", medium: "Lambda print", img: "https://images.unsplash.com/photo-1470071459604-7b8ec44ffd4b?w=600&h=400&fit=crop&crop=center" },
      { id: 5, title: "Tuned Landscapes", artist: "Jurgen Rooijackers", category: "Abstract", desc: "Landscapes transformed through creative vision.", year: "2024", medium: "Pigment print", img: "https://images.unsplash.com/photo-1506744038136-46273834b3fb?w=600&h=400&fit=crop&crop=center" },
      { id: 6, title: "Reverie", artist: "Julia Wimmerlin", category: "Portrait", desc: "Dreamlike portraits exploring consciousness.", year: "2025", medium: "Silver gelatin", img: "https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=600&h=400&fit=crop&crop=center" },
      { id: 7, title: "Half Remembered", artist: "Luca Ortis", category: "Abstract", desc: "Half remembered, half imagined memories.", year: "2023", medium: "Digital", img: "https://images.unsplash.com/photo-1541701494587-cb58502866ab?w=600&h=400&fit=crop&crop=center&sat=-20" },
      { id: 8, title: "Dialogue with the City", artist: "Natalia Rudychev", category: "Urban", desc: "Urban conversations captured in Le Mans, France.", year: "2024", medium: "Chromogenic", img: "https://images.unsplash.com/photo-1480714378408-67cf0d13bc1b?w=600&h=400&fit=crop&crop=center" },
      { id: 9, title: "Plain Plane Cuts", artist: "Olena Zubach", category: "Abstract", desc: "Geometric explorations of space and form.", year: "2025", medium: "Inkjet", img: "https://images.unsplash.com/photo-1558591710-4b4a1ae0f04d?w=600&h=400&fit=crop&crop=center" },
      { id: 10, title: "Heartbeat", artist: "Fie Tanderup", category: "Portrait", desc: "The rhythm of human emotion.", year: "2024", medium: "Digital print", img: "https://images.unsplash.com/photo-1544005313-94ddf0286df2?w=600&h=400&fit=crop&crop=center" },
      { id: 11, title: "My Kingdom", artist: "Sonja de Ridder", category: "Nature", desc: "Personal landscapes of belonging.", year: "2023", medium: "Giclée", img: "https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=600&h=400&fit=crop&crop=center" },
      { id: 12, title: "Strangers", artist: "Svetlana Astakhova", category: "Portrait", desc: "Anonymous faces in the urban environment.", year: "2025", medium: "C-print", img: "https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e?w=600&h=400&fit=crop&crop=center" },
      { id: 13, title: "City Breath", artist: "Tany Pototska", category: "Urban", desc: "The living pulse of urban spaces.", year: "2024", medium: "Archival pigment", img: "https://images.unsplash.com/photo-1496568816309-51d7c20e3b21?w=600&h=400&fit=crop&crop=center" },
      { id: 14, title: "Premium Mediocre", artist: "Xiaohan Lu", category: "Urban", desc: "Contemporary consumer culture examined.", year: "2025", medium: "Digital", img: "https://images.unsplash.com/photo-1559827291-72c739d2b0d6?w=600&h=400&fit=crop&crop=center" },
      { id: 15, title: "Stranged", artist: "Bernard BOSC", category: "Abstract", desc: "Estrangement and isolation visualized.", year: "2023", medium: "Lambda", img: "https://images.unsplash.com/photo-1541701494587-cb58502866ab?w=600&h=400&fit=crop&crop=center&sat=-30" },
      { id: 16, title: "MELT", artist: "Beth Burstein", category: "Abstract", desc: "Forms dissolving and transforming.", year: "2024", medium: "Pigment", img: "https://images.unsplash.com/photo-1558591710-4b4a1ae0f04d?w=600&h=400&fit=crop&crop=center&sat=-10" },
      { id: 17, title: "Between Worlds", artist: "Inna Skaldutska", category: "Nature", desc: "A bond between the physical and ethereal.", year: "2025", medium: "C-print", img: "https://images.unsplash.com/photo-1470071459604-7b8ec44ffd4b?w=600&h=400&fit=crop&crop=center&sat=10" },
      { id: 18, title: "Bloom", artist: "Iryna Semko", category: "Nature", desc: "The beauty of natural growth and decay.", year: "2024", medium: "Archival", img: "https://images.unsplash.com/photo-1500382017468-9049fed747ef?w=600&h=400&fit=crop&crop=center&sat=10" },
      { id: 19, title: "Constructs", artist: "Ken Collins", category: "Architecture", desc: "Architectural forms deconstructed.", year: "2023", medium: "Digital", img: "https://images.unsplash.com/photo-1480714378408-67cf0d13bc1b?w=600&h=400&fit=crop&crop=center&sat=-20" },
      { id: 20, title: "Vicissitudes", artist: "Jack Savage", category: "Architecture", desc: "The changing nature of desire.", year: "2025", medium: "Silver", img: "https://images.unsplash.com/photo-1496568816309-51d7c20e3b21?w=600&h=400&fit=crop&crop=center&sat=-20" }
    ];

    // ----- DOM refs -----
    const grid = document.getElementById('galleryGrid');
    const filterTabs = document.querySelectorAll('.filter-tab');
    const modalCheckbox = document.getElementById('lightboxModal');
    const lightboxImg = document.getElementById('lightboxImg');
    const lightboxTitle = document.getElementById('lightboxTitle');
    const lightboxArtist = document.getElementById('lightboxArtist');
    const lightboxDesc = document.getElementById('lightboxDesc');
    const lightboxCategory = document.getElementById('lightboxCategory');
    const lightboxYear = document.getElementById('lightboxYear');
    const lightboxMedium = document.getElementById('lightboxMedium');

    let currentFilter = 'all';

    // ----- render function -----
    function renderGallery(filter) {
      const filtered = filter === 'all' ? exhibitions : exhibitions.filter(ex => ex.category === filter);
      grid.innerHTML = filtered.map(ex => `
        <div class="exhibition-card bg-white rounded-xl overflow-hidden shadow-sm" data-id="${ex.id}" data-category="${ex.category}">
          <div class="card-img relative" style="background-image: url('${ex.img}');">
            <span class="category-badge absolute bottom-3 left-3">${ex.category}</span>
          </div>
          <div class="p-4 sm:p-5">
            <h3 class="text-xl font-normal text-[#2a3a3d]">${ex.title}</h3>
            <div class="text-sm font-light text-[#74948c]">${ex.artist}</div>
            <div class="flex items-center justify-between mt-3 pt-3 border-t border-[#cfb580]/30">
              <span class="ui-small text-[#864e3e]">${ex.year} · ${ex.medium}</span>
              <i class="fas fa-arrow-right text-[#ca7c4c] opacity-70 transition-opacity"></i>
            </div>
          </div>
        </div>
      `).join('');

      // attach click listeners to cards -> open modal
      document.querySelectorAll('.exhibition-card').forEach(card => {
        card.addEventListener('click', function() {
          const id = parseInt(this.dataset.id);
          const ex = exhibitions.find(e => e.id === id);
          if (ex) openLightbox(ex);
        });
      });
    }

    // ----- open lightbox (daisyUI modal) -----
    function openLightbox(ex) {
      lightboxImg.style.backgroundImage = `url('${ex.img}')`;
      lightboxTitle.textContent = ex.title;
      lightboxArtist.textContent = ex.artist;
      lightboxDesc.textContent = ex.desc;
      lightboxCategory.textContent = ex.category;
      lightboxYear.textContent = ex.year;
      lightboxMedium.textContent = ex.medium;
      modalCheckbox.checked = true;
    }

    // ----- filter logic -----
    filterTabs.forEach(tab => {
      tab.addEventListener('click', function() {
        filterTabs.forEach(t => t.classList.remove('active'));
        this.classList.add('active');
        const filter = this.dataset.filter;
        currentFilter = filter;
        renderGallery(filter);
      });
    });

    // initial render
    renderGallery('all');
  </script>
</body>
</html>
